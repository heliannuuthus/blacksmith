# Greasy Fork 同步：push 到 main 且 scripts/ 有变更时触发
# Secret: GREASYFORK_URL_{NAME}（必需）、GREASYFORK_SECRET_{NAME}（可选）
# 新增脚本：在 matrix 加一项，并配置 secret
name: Greasy Fork Sync

on:
  push:
    branches: [main]
    paths: ['scripts/**/*.user.js']

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - script: totp-auto-paste
            suffix: TOTP_AUTO_PASTE
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed
        id: check
        run: |
          git diff --name-only HEAD^ HEAD -- "scripts/${{ matrix.script }}/" "scripts/${{ matrix.script }}.user.js" | grep -q . && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Notify Greasy Fork
        if: steps.check.outputs.changed == 'true'
        env:
          WEBHOOK_URL: ${{ secrets[format('GREASYFORK_URL_{0}', matrix.suffix)] }}
          WEBHOOK_SECRET: ${{ secrets[format('GREASYFORK_SECRET_{0}', matrix.suffix)] }}
          PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          [ -z "$WEBHOOK_URL" ] && echo "::warning::Secret not set" && exit 0
          printf '%s' "$PAYLOAD" > /tmp/payload.json
          HEADERS=(-H "Content-Type: application/json" -H "X-GitHub-Event: push")
          [ -n "$WEBHOOK_SECRET" ] && HEADERS+=(-H "X-Hub-Signature-256: sha256=$(openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" /tmp/payload.json | awk '{print $2}')")
          curl -sS -X POST "$WEBHOOK_URL" "${HEADERS[@]}" -d @/tmp/payload.json
